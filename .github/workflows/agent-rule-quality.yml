name: Agent — Rule Quality Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'rules/**/*.json'

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: Quality Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout virgil-agents (agents live there)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/virgil-agents
          token: ${{ secrets.VIRGIL_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run rule quality agent
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:         ${{ secrets.VIRGIL_GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ORG_NAME:             ${{ github.repository_owner }}
          PR_NUMBER:            ${{ github.event.pull_request.number }}
          COMMUNITY_REPO:       ${{ github.event.repository.name }}
        run: node agents/agent-rule-quality.js
